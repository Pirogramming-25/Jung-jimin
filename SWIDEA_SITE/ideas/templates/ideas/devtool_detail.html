{% extends 'ideas/base.html' %}

{% block content %}
<h1>DevTool Detail</h1>

<h2>{{ devtool.name }}</h2>
<p>{{ devtool.kind }}</p>
<p>{{ devtool.content }}</p>

<h3>만들 수 있는 SW 목록</h3>

{% for idea in ideas %}
    <p>
        <a href="{% url 'ideas:idea_detail' idea.pk %}">
            {{ idea.title }}
        </a>
    </p>
{% empty %}
    <p>아직 연결된 아이디어가 없습니다.</p>
{% endfor %}

<a href="{% url 'ideas:devtool_update' devtool.pk %}">수정</a>
<a href="{% url 'ideas:devtool_delete' devtool.pk %}">삭제</a>
<a href="{% url 'ideas:devtool_list' %}">목록</a>
{% endblock %}
