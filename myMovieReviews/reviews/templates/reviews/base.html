<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Movie Reviews</title>

    <style>

        body{
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header{
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 25px 60px;
            border-bottom: 1px solid #ddd;
        }

        header a{
            text-decoration: none;
            color: black;
        }

        .logo{
            font-size: 30px;
            font-weight: bold;
        }

        .logo span{
            color: #ff4b6e;
        }

        .container{
            width: 80%;
            margin: 40px auto;
        }

        .btn{
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            background: black;
            color: white;
        }

    </style>
</head>
<body>
    <header>
        <a href="{% url 'reviews:review_list' %}" class="logo">
            my<span>Movie</span>reviews
        </a>

        <a href="{% url 'reviews:review_create' %}">
            Add a New review
        </a>
    </header>

    <div class="container">
    {% block content %}

    {% endblock %}
    </div>
</body>
</html>
