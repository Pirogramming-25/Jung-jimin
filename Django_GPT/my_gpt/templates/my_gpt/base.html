{% load static %}

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Django GPT</title>

    <link
        rel="stylesheet"
        href="{% static 'my_gpt/css/style.css' %}"
    >
</head>

<body>

<nav>
    <a href="{% url 'sentiment' %}">
        감정 분석
    </a>
    |

    <a href="{% url 'summarize' %}">
        문서 요약
    </a>
    |

    <a href="{% url 'moderate' %}">
        유해 표현 분석
    </a>
    |

    <a href="{% url 'combo' %}">
        복합 분석
    </a>
    |

    {% if user.is_authenticated %}
        <span>
            {{ user.username }}님
        </span>

        <form
            method="post"
            action="{% url 'logout' %}"
            style="display: inline;"
        >
            {% csrf_token %}

            <button type="submit">
                로그아웃
            </button>
        </form>
    {% else %}
        <a href="{% url 'login' %}">
            로그인
        </a>
    {% endif %}
</nav>

<hr>

<main>
    {% block content %}
    {% endblock %}
</main>

<script src="{% static 'my_gpt/js/common.js' %}"></script>

{% block extra_js %}
{% endblock %}

</body>
</html>
