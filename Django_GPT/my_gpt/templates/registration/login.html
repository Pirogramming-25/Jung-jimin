{% extends "my_gpt/base.html" %}

{% block content %}
<h1>로그인</h1>

{% if request.GET.required == "1" %}
    <script>
        alert("해당 기능은 로그인이 필요합니다.");
    </script>
{% endif %}

{% if form.errors %}
    <p>아이디 또는 비밀번호가 올바르지 않습니다.</p>
{% endif %}

<form method="post">
    {% csrf_token %}

    <div>
        <label for="{{ form.username.id_for_label }}">아이디</label>
        {{ form.username }}
    </div>

    <div>
        <label for="{{ form.password.id_for_label }}">비밀번호</label>
        {{ form.password }}
    </div>

    {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
    {% endif %}

    <button type="submit">로그인</button>
</form>
{% endblock %}
