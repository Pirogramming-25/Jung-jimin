{% extends 'base.html' %}

{% block head %}
<title>게시글 수정</title>

<style>
    main {
        min-height: 100vh;
        padding: 50px 20px;
        background-color: #f7f7f7;
    }

    .update-container {
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
    }

    .update-card {
        padding: 36px;
        background-color: white;
        border: 1px solid #e5e5e5;
        border-radius: 18px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .update-title {
        margin: 0 0 8px;
        color: #222;
        font-size: 30px;
        font-weight: 700;
    }

    .update-description {
        margin-bottom: 30px;
        color: #777;
        font-size: 15px;
    }

    .post-form p {
        margin-bottom: 22px;
    }

    .post-form label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-size: 15px;
        font-weight: 600;
    }

    .post-form input,
    .post-form select,
    .post-form textarea {
        display: block;
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #d8d8d8;
        border-radius: 10px;
        background-color: white;
        box-sizing: border-box;
        font-size: 15px;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .post-form input:focus,
    .post-form select:focus,
    .post-form textarea:focus {
        border-color: #0d6efd;
        outline: none;
        box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.12);
    }

    .post-form textarea {
        min-height: 150px;
        resize: vertical;
    }

    .post-form input[type="file"] {
        padding: 10px;
        background-color: #fafafa;
    }

    .current-info {
        margin: 4px 0 22px;
        padding: 16px;
        border-radius: 12px;
        background-color: #eef5ff;
        color: #3f5f86;
        font-size: 14px;
        line-height: 1.6;
    }

    .button-group {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 30px;
    }

    .submit-button {
        padding: 12px 24px;
        border: none;
        border-radius: 10px;
        background-color: #0d6efd;
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.2s;
    }

    .submit-button:hover {
        background-color: #0b5ed7;
        transform: translateY(-1px);
    }

    .cancel-button {
        display: inline-block;
        padding: 12px 24px;
        border: 1px solid #d8d8d8;
        border-radius: 10px;
        background-color: white;
        color: #555;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
    }

    .cancel-button:hover {
        background-color: #f5f5f5;
        color: #333;
    }

    @media (max-width: 600px) {
        main {
            padding: 24px 14px;
        }

        .update-card {
            padding: 24px 18px;
        }

        .update-title {
            font-size: 25px;
        }

        .button-group {
            flex-direction: column;
        }

        .submit-button,
        .cancel-button {
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="update-container">
    <div class="update-card">
        <h1 class="update-title">게시글 수정</h1>

        <p class="update-description">
            상품 정보와 영양성분을 확인한 뒤 수정해주세요.
        </p>

        <form
            class="post-form"
            action="{% url 'posts:update' post.pk %}"
            method="POST"
            enctype="multipart/form-data"
        >
            {% csrf_token %}

            {{ form.as_p }}

            <div class="current-info">
                기존 영양성분 값은 직접 수정할 수 있습니다.
                영양성분 이미지를 변경하더라도 현재 수정 페이지에서는 자동 분석되지 않습니다.
            </div>

            <div class="button-group">
                <a
                    href="{% url 'posts:detail' post.pk %}"
                    class="cancel-button"
                >
                    취소
                </a>

                <button type="submit" class="submit-button">
                    수정 완료
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
